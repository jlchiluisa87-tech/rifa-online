<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cartilla = document.getElementById("cartilla");

const vendidos = [];

const consulta = await getDocs(
collection(db,"participantes")
);

consulta.forEach((doc) => {
vendidos.push(doc.data().numero);
});

for(let i=1;i<=500;i++){

const numero = document.createElement("button");

numero.innerText = i;

numero.style.padding="10px";
numero.style.color="white";
numero.style.border="none";

if(vendidos.includes(i)){
numero.style.background="red";
numero.disabled=true;
}else{
numero.style.background="#28a745";
numero.onclick=()=>{
window.location.href=
"comprar.html?numero="+i;
};
}

cartilla.appendChild(numero);

}

</script>
