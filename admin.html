<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>📋 Panel de Administración</h1>

<h2>Participantes Registrados</h2>

<button id="sortear"
style="padding:15px;background:green;color:white;font-size:18px;border:none;">
🎲 Realizar Sorteo </button>

<br><br>

<h2 id="ganador"></h2>

<table border="1" style="margin:auto;border-collapse:collapse;">
<thead>
<tr>
<th>Número</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaParticipantes">
</tbody>

</table>

<br><br>

<a href="index.html">
<button type="button"
style="padding:10px;background:red;color:white;border:none;">
🏠 Volver al Inicio
</button>
</a>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const tabla =
document.getElementById("tablaParticipantes");

const consulta =
await getDocs(collection(db,"participantes"));

const participantes = [];

consulta.forEach((doc)=>{

const datos = doc.data();

participantes.push(datos);

tabla.innerHTML += `
<tr>
<td>${datos.numero}</td>
<td>${datos.nombre}</td>
<td>${datos.telefono}</td>
<td>${datos.estado}</td>
</tr>
`;

});

document.getElementById("sortear").onclick = () => {

if(participantes.length === 0){
alert("No hay participantes registrados");
return;
}

const ganador =
participantes[
Math.floor(Math.random() * participantes.length)
];

document.getElementById("ganador").innerHTML =
"🏆 GANADOR <br><br>" +
"Nombre: " + ganador.nombre + "<br>" +
"Teléfono: " + ganador.telefono + "<br>" +
"Número: " + ganador.numero;

};

</script>

</body>
</html>
