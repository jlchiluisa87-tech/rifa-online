<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador</title>
</head>

<body style="font-family:Arial;text-align:center;background:#f5f5f5;">

<h1>📋 Panel de Administración</h1>

<h2 id="totalParticipantes">👥 Participantes: 0</h2>

<h2 id="totalVendidos">🎟️ Números vendidos: 0</h2>

<button id="sortear"
style="padding:15px;background:green;color:white;font-size:18px;border:none;border-radius:8px;">
🎲 Realizar Sorteo </button>

<br><br>

<div id="ganador"
style="font-size:24px;font-weight:bold;color:green;">
</div>

<br>

<table border="1"
style="margin:auto;border-collapse:collapse;background:white;">
<thead>
<tr style="background:#333;color:white;">
<th>Número</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaParticipantes">
</tbody>

</table>

<br><br>

<a href="index.html">
<button
type="button"
style="padding:12px;background:red;color:white;border:none;border-radius:8px;">
🏠 Volver al Inicio
</button>
</a>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const tabla = document.getElementById("tablaParticipantes");

const consulta =
await getDocs(collection(db,"participantes"));

const participantes = [];

let total = 0;

consulta.forEach((doc)=>{

const datos = doc.data();

participantes.push(datos);

total++;

tabla.innerHTML += `
<tr>
<td>${datos.numero}</td>
<td>${datos.nombre}</td>
<td>${datos.telefono}</td>
<td>${datos.estado}</td>
</tr>
`;

});

document.getElementById("totalParticipantes").innerHTML =
"👥 Participantes: " + total;

document.getElementById("totalVendidos").innerHTML =
"🎟️ Números vendidos: " + total;

document.getElementById("sortear").onclick = () => {

const clave = prompt("🔒 Ingrese la clave de administrador");

if(clave !== "Esforse1987*"){
alert("❌ Clave incorrecta");
return;
}

if(participantes.length === 0){
alert("No hay participantes registrados");
return;
}

const ganador =
participantes[
Math.floor(Math.random() * participantes.length)
];

document.getElementById("ganador").innerHTML =
"🏆 GANADOR DEL SORTEO 🏆<br><br>" +
"👤 Nombre: " + ganador.nombre + "<br>" +
"📞 Teléfono: " + ganador.telefono + "<br>" +
"🎟️ Número: " + ganador.numero;

};

</script>

</body>
