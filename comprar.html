<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprar Número</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>Comprar Número</h1>

<h2 id="numeroSeleccionado"></h2>

<form id="formulario">

<input
type="text"
id="nombre"
placeholder="Nombre completo"
required
style="padding:10px;width:300px;"><br><br>

<input
type="tel"
id="telefono"
placeholder="Teléfono"
required
style="padding:10px;width:300px;"><br><br>

<img src="nombre_nuevo.png" width="300"><br><br>

<h3>Cuenta: 2205631275</h3>
<h3>Titular: JOSE LUIS CHILUISA</h3>

<br>

<button
type="submit"
style="padding:15px;background:green;color:white;font-size:18px;border:none;">
✅ Ya realicé el pago
</button>

<br><br>

<a href="index.html">
<button
type="button"
style="padding:15px;background:red;color:white;font-size:18px;border:none;">
⬅ Volver al Inicio
</button>
</a>
<br><br>

<a href="index.html">
<button
style="padding:15px;background:red;color:white;font-size:18px;border:none;">
⬅ Volver al Inicio
</button>
</a>

</form>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const parametros = new URLSearchParams(window.location.search);
const numero = parametros.get("numero");

document.getElementById("numeroSeleccionado").innerText =
"Numero seleccionado: " + numero;

document.getElementById("formulario").onsubmit = async (e) => {

e.preventDefault();

const nombre =
document.getElementById("nombre").value;

const telefono =
document.getElementById("telefono").value;

await addDoc(
collection(db,"participantes"),
{
nombre:nombre,
telefono:telefono,
numero:Number(numero),
estado:"compró"
}
);

alert("Número reservado correctamente");

window.location.href="numeros.html";

};

</script>

</body>
</html>
